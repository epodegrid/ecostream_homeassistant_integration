blueprint:
  name: EcoStream Intelligent Ventilation Control
  description: >
    PID-achtige regeling voor BUVA EcoStream op basis van CO₂, RV%, TVOC,
    met dag/nachtprofielen en ramping (60–300 m³/h). Boost/override heeft
    altijd prioriteit. 
  domain: automation

  input:
    co2_sensor:
      name: CO₂ sensor
      selector:
        entity:
          domain: sensor
          device_class: carbon_dioxide

    humidity_sensor:
      name: Humidity (RV%) sensor
      selector:
        entity:
          domain: sensor
          device_class: humidity

    tvoc_sensor:
      name: TVOC sensor
      selector:
        entity:
          domain: sensor

    qset_number:
      name: EcoStream Qset Number (number)
      selector:
        entity:
          domain: number

    day_start:
      name: Start dagmodus
      default: "07:00"
      selector:
        time: {}

    night_start:
      name: Start nachtmodus
      default: "23:00"
      selector:
        time: {}

    min_qset:
      name: Minimum ventilatie (m³/h)
      default: 60
      selector:
        number:
          min: 30
          max: 150
          step: 5

    max_qset:
      name: Maximum ventilatie (m³/h)
      default: 300
      selector:
        number:
          min: 200
          max: 350
          step: 10

mode: single
max_exceeded: silent

trigger:
  - platform: time_pattern
    minutes: "/1"

variables:
  # Mapping inputs naar variabelen (NO templates!)
  co2_sensor_entity: !input co2_sensor
  humidity_sensor_entity: !input humidity_sensor
  tvoc_sensor_entity: !input tvoc_sensor
  qset_entity: !input qset_number
  day_start_val: !input day_start
  night_start_val: !input night_start
  qset_min: !input min_qset
  qset_max: !input max_qset

  # Sensordata (TEMPLATES)
  co2: "{{ states(co2_sensor_entity) | float(0) }}"
  rv: "{{ states(humidity_sensor_entity) | float(0) }}"
  tvoc: "{{ states(tvoc_sensor_entity) | float(0) }}"

  now_time: "{{ now().strftime('%H:%M') }}"

  # Dagmodus logica
  is_day: >
    {{
      (now_time >= day_start_val and now_time < night_start_val)
      if day_start_val < night_start_val
      else not (now_time >= night_start_val and now_time < day_start_val)
    }}

  # Gewichtsfactoren
  w_co2: 0.60
  w_rv: 0.30
  w_tvoc: 0.10

  # Normalisatie
  co2_norm: "{{ ((co2 - 400) / 1600) | max(0) | min(1) }}"
  rv_norm: "{{ ((rv - 35) / 35) | max(0) | min(1) }}"
  tvoc_norm: "{{ (tvoc / 600) | max(0) | min(1) }}"

  score: >
    {{
      (co2_norm * w_co2) +
      (rv_norm * w_rv) +
      (tvoc_norm * w_tvoc)
    }}

  profile_gain: "{{ 1.4 if is_day else 0.7 }}"
  final_score: "{{ (score * profile_gain) | min(1) }}"

  target_qset: >
    {{
      (qset_min + final_score * (qset_max - qset_min))
      | round(0)
    }}

action:
  - variables:
      current: "{{ states(qset_entity) | float(0) }}"
      target: "{{ target_qset }}"
      diff: "{{ target - current }}"

  - choose:
      - conditions: "{{ diff | abs >= 10 }}"
        sequence:
          - service: number.set_value
            target:
              entity_id: "{{ qset_entity }}"
            data:
              value: "{{ (current + diff / 3) | round(0) }}"
